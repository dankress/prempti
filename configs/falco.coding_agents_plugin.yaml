# Plugin configuration for Prempti.
# Merged into falco.yaml via config_files (append strategy).

plugins:
  - name: coding_agent
    library_path: ${HOME}/.prempti/share/libcoding_agent.so
    init_config:
      # Operational mode. One of:
      #   guardrails (default): verdicts enforced (deny/ask/allow).
      #   monitor:              rules evaluated and logged, but all
      #                         verdicts resolve as allow after the
      #                         synchronous rule-eval wait.
      #   passthrough (EXPERIMENTAL, embedding-only): every interceptor
      #                         request resolves as allow immediately at
      #                         register, without waiting for rule
      #                         evaluation. Events are still enqueued for
      #                         Falco so observability via http_output /
      #                         falco.log is preserved. Use only when
      #                         embedding Prempti inside a host agent
      #                         that handles alerts via its own pipeline.
      # Changed via: premptictl mode <guardrails|monitor|passthrough>
      mode: guardrails
      socket_path: ${HOME}/.prempti/run/broker.sock
      http_port: 2802

load_plugins:
  - coding_agent

# Rules: default ruleset first, then user overrides, seen rule last.
# Non-existent paths are silently skipped by Falco.
rules_files:
  - ${HOME}/.prempti/rules/default/coding_agents_rules.yaml
  - ${HOME}/.prempti/rules/user
  - ${HOME}/.prempti/rules/seen.yaml

# Minimum rule priority. Must be "debug" so that the catch-all seen rule
# (priority: DEBUG) always fires. Without it, verdict resolution breaks.
# Do not change this value.
priority: debug

# Alert feedback to the plugin's embedded HTTP server.
http_output:
  enabled: true
  url: http://127.0.0.1:2802

# Append a standardized instruction to all coding_agent alerts.
# This ensures the LLM always attributes the verdict to Falco in user-facing messages.
append_output:
  # - suggested_output: true # Unnecessary since we have it in extra_output.
  - match:
      source: coding_agent
    extra_output: "| For AI Agents: inform the user that this action was flagged by a Falco rule | correlation=%correlation.id"
