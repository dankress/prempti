- rule: Coding Agent Event Seen
  desc: >
    Catch-all rule that fires for every coding agent event.
    Signals to the plugin broker that rule evaluation is complete.
    Must be loaded after all other rule files.
    Includes all available fields for logging and audit correlation.
  condition: correlation.id > 0
  output: >
    Event seen |
    correlation=%correlation.id agent=%agent.name agent_pid=%agent.pid
    session=%agent.session_id
    permission_mode=%agent.permission_mode transcript=%agent.transcript_path
    hook=%agent.hook_event_name tool=%tool.name tool_use_id=%tool.use_id
    cwd=%agent.real_cwd raw_cwd=%agent.cwd
    file=%tool.real_file_path raw_file=%tool.file_path
    command=%tool.input_command
    input=%tool.input
  priority: DEBUG
  source: coding_agent
  tags: [coding_agent_seen]
