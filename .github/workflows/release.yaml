# SPDX-License-Identifier: Apache-2.0
name: Release

# Triggered on tag push (vX.Y.Z) or manual dispatch. Builds the platform
# packages for every supported arch and uploads them to the GitHub Release
# that matches the tag.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Release (Linux ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch head as of 2026-04

      - name: Package
        run: make linux-${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: build/prempti-*-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  macos:
    name: Release (macOS universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch head as of 2026-04
        with:
          targets: x86_64-apple-darwin

      - name: Install Rosetta
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Install arm64 build dependencies
        run: brew install cmake openssl@3
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1

      - name: Install x86_64 Homebrew at /usr/local
        env:
          NONINTERACTIVE: "1"
        run: |
          arch -x86_64 /bin/bash -c \
            "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

      - name: Install x86_64 build dependencies
        run: arch -x86_64 /usr/local/bin/brew install cmake openssl@3
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1

      - name: Cache Falco build
        uses: actions/cache@v4
        with:
          path: |
            build/falco-*-darwin-*
            build/falco-src-*
          key: falco-macos-universal-${{ hashFiles('installers/macos/build-falco.sh') }}

      - name: Package
        run: make macos-universal

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: |
            build/prempti-*-darwin-universal.tar.gz
            build/prempti-*-darwin-universal.pkg
          if-no-files-found: error

  windows:
    name: Release (Windows ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            vcpkg_triplet: x64-windows-static
          - arch: arm64
            runner: windows-11-arm
            vcpkg_triplet: arm64-windows-static
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch head as of 2026-04

      - name: Install make
        run: choco install make -y

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed\${{ matrix.vcpkg_triplet }}
          key: vcpkg-${{ matrix.vcpkg_triplet }}-curl-${{ hashFiles('.github/workflows/release.yaml') }}

      - name: Install vcpkg curl
        run: vcpkg install curl:${{ matrix.vcpkg_triplet }}

      - name: Cache Falco build
        uses: actions/cache@v4
        with:
          path: |
            build/falco-*-windows-*
            build/falco-src-*
          key: falco-windows-${{ matrix.arch }}-${{ hashFiles('installers/windows/build-falco.ps1', 'installers/windows/falco-windows-*.patch') }}

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix
          wix eula accept wix7
          wix extension add --global WixToolset.Util.wixext
          wix extension add --global WixToolset.UI.wixext

      - name: Build MSI
        run: >-
          powershell -NoProfile -ExecutionPolicy Bypass -File installers/windows/package.ps1
          -Arch ${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            build/out/*.msi
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            artifacts/linux-x86_64/*
            artifacts/linux-aarch64/*
            artifacts/macos-universal/*
            artifacts/windows-x64/*
            artifacts/windows-arm64/*
          fail_on_unmatched_files: true
          generate_release_notes: true
